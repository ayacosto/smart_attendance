
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:var(--color-background-primary);--bg2:var(--color-background-secondary);--bg3:var(--color-background-tertiary);--txt:var(--color-text-primary);--txt2:var(--color-text-secondary);--bdr:var(--color-border-tertiary);--bdr2:var(--color-border-secondary);--acc:#1D9E75;--acc2:#0F6E56;--danger:#E24B4A;--warn:#EF9F27}
  body{font-family:'Syne',sans-serif;color:var(--txt);background:transparent;padding:1rem 0}
  .shell{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:680px}
  .card{background:var(--bg);border:0.5px solid var(--bdr);border-radius:var(--border-radius-lg);overflow:hidden}
  .card-head{padding:14px 16px 12px;border-bottom:0.5px solid var(--bdr);display:flex;align-items:center;gap:8px}
  .card-head span{font-size:13px;font-weight:500;letter-spacing:.02em}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--bdr2);flex-shrink:0}
  .dot.live{background:#5DCAA5;animation:pulse 1.8s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .card-body{padding:14px 16px}
  .cam-frame{width:100%;aspect-ratio:4/3;background:var(--bg3);border-radius:var(--border-radius-md);overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;border:0.5px solid var(--bdr)}
  video,canvas,img.preview{width:100%;height:100%;object-fit:cover;border-radius:var(--border-radius-md)}
  .cam-placeholder{text-align:center;color:var(--txt2);font-size:13px;line-height:1.6;padding:1rem}
  .cam-placeholder svg{width:32px;height:32px;margin-bottom:8px;opacity:.4}
  .btn-row{display:flex;gap:8px;margin-top:10px}
  button{font-family:'Syne',sans-serif;font-size:13px;font-weight:500;padding:8px 14px;border-radius:var(--border-radius-md);border:0.5px solid var(--bdr2);background:var(--bg);color:var(--txt);cursor:pointer;flex:1;transition:background .15s}
  button:hover{background:var(--bg2)}
  button.primary{background:var(--acc);color:#fff;border-color:var(--acc)}
  button.primary:hover{background:var(--acc2)}
  button:disabled{opacity:.4;cursor:not-allowed}
  .upload-zone{width:100%;aspect-ratio:4/3;border:1.5px dashed var(--bdr2);border-radius:var(--border-radius-md);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:border-color .15s;color:var(--txt2);font-size:13px;text-align:center;padding:1rem;gap:6px;position:relative}
  .upload-zone:hover{border-color:var(--acc)}
  .upload-zone svg{width:28px;height:28px;opacity:.45}
  .upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
  .result-panel{grid-column:1/-1;background:var(--bg);border:0.5px solid var(--bdr);border-radius:var(--border-radius-lg);overflow:hidden}
  .result-inner{padding:14px 16px;min-height:72px;display:flex;align-items:center;gap:14px}
  .status-icon{width:40px;height:40px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px}
  .status-icon.idle{background:var(--bg3)}
  .status-icon.ok{background:#E1F5EE}
  .status-icon.fail{background:#FCEBEB}
  .status-icon.warn{background:#FAEEDA}
  .result-text h3{font-size:15px;font-weight:500;margin-bottom:2px}
  .result-text p{font-size:13px;color:var(--txt2);font-family:'DM Mono',monospace}
  .conf-bar{margin-top:8px;height:4px;background:var(--bg3);border-radius:2px;width:200px}
  .conf-fill{height:100%;border-radius:2px;background:var(--acc);transition:width .4s}
  .log-panel{grid-column:1/-1;background:var(--bg);border:0.5px solid var(--bdr);border-radius:var(--border-radius-lg);overflow:hidden}
  .log-head{padding:12px 16px;border-bottom:0.5px solid var(--bdr);display:flex;align-items:center;justify-content:space-between}
  .log-head span{font-size:13px;font-weight:500}
  .log-clear{font-size:12px;color:var(--txt2);background:none;border:none;cursor:pointer;padding:4px 8px;font-family:'Syne',sans-serif;flex:unset;width:auto}
  .log-clear:hover{color:var(--txt);background:var(--bg2);border-radius:4px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;padding:8px 16px;color:var(--txt2);font-weight:500;font-size:12px;letter-spacing:.04em;border-bottom:0.5px solid var(--bdr)}
  td{padding:9px 16px;border-bottom:0.5px solid var(--bdr)}
  tr:last-child td{border-bottom:none}
  .badge{display:inline-flex;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;font-family:'DM Mono',monospace}
  .badge.present{background:#E1F5EE;color:#0F6E56}
  .badge.unknown{background:#FAEEDA;color:#854F0B}
  .empty-log{padding:20px 16px;text-align:center;color:var(--txt2);font-size:13px}
</style>

<h2 class="sr-only">Smart attendance system interface with webcam and photo upload</h2>

<div class="shell">
  <div class="card">
    <div class="card-head"><div class="dot" id="camdot"></div><span>Live webcam</span></div>
    <div class="card-body">
      <div class="cam-frame" id="camframe">
        <div class="cam-placeholder" id="camphold">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 10l4.553-2.069A1 1 0 0121 8.87v6.26a1 1 0 01-1.447.9L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/></svg>
          <div>Camera not started</div>
        </div>
        <video id="video" style="display:none" autoplay playsinline></video>
        <canvas id="snapcanvas" style="display:none"></canvas>
      </div>
      <div class="btn-row">
        <button id="startcam">Start camera</button>
        <button id="snapbtn" class="primary" disabled>Capture &amp; check in</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-head"><div class="dot"></div><span>Upload photo</span></div>
    <div class="card-body">
      <div class="upload-zone" id="dropzone">
        <input type="file" accept="image/*" id="fileinput">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
        <span>Drop image or click to browse</span>
        <span style="font-size:11px;opacity:.6">JPG, PNG, WEBP</span>
        <img class="preview" id="imgpreview" style="display:none;position:absolute;inset:0;border-radius:var(--border-radius-md)">
      </div>
      <div class="btn-row">
        <button id="clearbtn">Clear</button>
        <button id="uploadbtn" class="primary" disabled>Check in</button>
      </div>
    </div>
  </div>

  <div class="result-panel">
    <div class="result-inner" id="resultinner">
      <div class="status-icon idle" id="statusicon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
      </div>
      <div class="result-text">
        <h3 id="resultname">Waiting for face scan...</h3>
        <p id="resultmeta">Use webcam or upload a photo to check in</p>
        <div class="conf-bar" id="confbar" style="display:none"><div class="conf-fill" id="conffill"></div></div>
      </div>
    </div>
  </div>

  <div class="log-panel">
    <div class="log-head">
      <span>Attendance log</span>
      <button class="log-clear" onclick="clearLog()">Clear</button>
    </div>
    <div id="logtable">
      <div class="empty-log">No attendance recorded yet</div>
    </div>
  </div>
</div>

<script>
const people = ["Anas","Mathias","Taha"];
const log = [];
let stream = null;

const video = document.getElementById('video');
const snapCanvas = document.getElementById('snapcanvas');
const camframe = document.getElementById('camframe');
const camphold = document.getElementById('camphold');
const camdot = document.getElementById('camdot');
const startcam = document.getElementById('startcam');
const snapbtn = document.getElementById('snapbtn');
const fileinput = document.getElementById('fileinput');
const imgpreview = document.getElementById('imgpreview');
const uploadbtn = document.getElementById('uploadbtn');
const clearbtn = document.getElementById('clearbtn');

startcam.onclick = async () => {
  if(stream){
    stream.getTracks().forEach(t=>t.stop());
    stream=null;
    video.style.display='none';
    camphold.style.display='flex';
    camdot.classList.remove('live');
    startcam.textContent='Start camera';
    snapbtn.disabled=true;
    return;
  }
  try{
    stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:false});
    video.srcObject = stream;
    video.style.display='block';
    camphold.style.display='none';
    camdot.classList.add('live');
    startcam.textContent='Stop camera';
    snapbtn.disabled=false;
  }catch(e){
    setResult('fail','Camera access denied','Allow camera permission and try again',0);
  }
};

snapbtn.onclick = () => {
  snapCanvas.width = video.videoWidth;
  snapCanvas.height = video.videoHeight;
  snapCanvas.getContext('2d').drawImage(video,0,0);
  setResult('processing','Scanning face...','Running ArcFace recognition',0);
  setTimeout(()=>fakeRecognize(),900);
};

fileinput.onchange = (e) => {
  const file = e.target.files[0];
  if(!file) return;
  const url = URL.createObjectURL(file);
  imgpreview.src = url;
  imgpreview.style.display='block';
  uploadbtn.disabled=false;
};

uploadbtn.onclick = () => {
  setResult('processing','Scanning face...','Extracting ArcFace embedding',0);
  setTimeout(()=>fakeRecognize(),900);
};

clearbtn.onclick = () => {
  imgpreview.style.display='none';
  imgpreview.src='';
  fileinput.value='';
  uploadbtn.disabled=true;
  setResult('idle','Waiting for face scan...','Use webcam or upload a photo to check in',0);
};

function fakeRecognize(){
  const conf = 0.62 + Math.random()*0.35;
  if(conf < 0.67){
    setResult('fail','Face not recognized','Confidence too low — try better lighting',conf);
    return;
  }
  const name = people[Math.floor(Math.random()*people.length)];
  const today = new Date().toLocaleDateString('en-GB');
  const time = new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  const already = log.find(r=>r.name===name && r.date===today);
  if(already){
    setResult('warn',`${name} already checked in`,'Duplicate entry prevented — marked earlier today',conf);
    return;
  }
  log.unshift({name,date:today,time,conf});
  setResult('ok',`${name} — checked in`,`${today} at ${time} · confidence ${(conf*100).toFixed(0)}%`,conf);
  renderLog();
}

function setResult(type,title,meta,conf){
  const icon = document.getElementById('statusicon');
  const nm = document.getElementById('resultname');
  const mt = document.getElementById('resultmeta');
  const bar = document.getElementById('confbar');
  const fill = document.getElementById('conffill');
  const icons = {
    idle:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>',
    processing:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>',
    ok:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0F6E56" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>',
    fail:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#A32D2D" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>',
    warn:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#854F0B" stroke-width="2"><path d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>'
  };
  icon.className='status-icon '+(type==='processing'?'idle':type);
  icon.innerHTML=icons[type]||icons.idle;
  nm.textContent=title;
  mt.textContent=meta;
  if(conf>0){bar.style.display='block';fill.style.width=(conf*100).toFixed(0)+'%';}
  else{bar.style.display='none';}
}

function renderLog(){
  const el = document.getElementById('logtable');
  if(!log.length){el.innerHTML='<div class="empty-log">No attendance recorded yet</div>';return;}
  el.innerHTML=`<table><thead><tr><th>Name</th><th>Date</th><th>Time</th><th>Confidence</th><th>Status</th></tr></thead><tbody>${
    log.map(r=>`<tr>
      <td style="font-weight:500">${r.name}</td>
      <td style="font-family:'DM Mono',monospace;font-size:12px">${r.date}</td>
      <td style="font-family:'DM Mono',monospace;font-size:12px">${r.time}</td>
      <td style="font-family:'DM Mono',monospace;font-size:12px">${(r.conf*100).toFixed(0)}%</td>
      <td><span class="badge present">Present</span></td>
    </tr>`).join('')
  }</tbody></table>`;
}

function clearLog(){
  log.length=0;
  renderLog();
  setResult('idle','Waiting for face scan...','Use webcam or upload a photo to check in',0);
}
</script>
